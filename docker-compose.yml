version: "3.9"

services:
  wine-quality-api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: wine-quality-api

    restart: unless-stopped

    ports:
      - "8000:8000"

    environment:
      PYTHONUNBUFFERED: "1"
      MLFLOW_TRACKING_URI: "/app/mlruns"

    volumes:
      - ./mlruns:/app/mlruns
      - ./artifacts:/app/artifacts
      - ./logs:/app/logs
      - ./data:/app/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
