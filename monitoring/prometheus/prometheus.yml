global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files: []

scrape_configs:

  - job_name: "prometheus"

    static_configs:
      - targets:
          - localhost:9090

  - job_name: "wine-quality-api"

    metrics_path: /metrics

    scrape_interval: 5s

    static_configs:
      - targets:
          - host.docker.internal:8000

  - job_name: "node-exporter"

    static_configs:
      - targets:
          - host.docker.internal:9100
