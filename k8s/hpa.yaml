apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wine-quality-api-hpa
  labels:
    app: wine-quality-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wine-quality-api

  minReplicas: 2
  maxReplicas: 5

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
